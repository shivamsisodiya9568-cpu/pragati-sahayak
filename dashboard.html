<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Board • Pragati Sahayak</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-950">
  <header class="bg-white border-b sticky top-0 z-20">
    <div class="max-w-6xl mx-auto px-5 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <span class="w-10 h-10 rounded-2xl bg-cyan-400 grid place-items-center font-black">PS</span>
        <span class="font-bold">Pragati Sahayak</span>
      </a>
      <div class="flex items-center gap-3">
        <span id="ps-user-email" class="hidden md:inline text-sm text-zinc-500"></span>
        <button onclick="psLogout()" class="rounded-full bg-zinc-950 text-white px-5 py-2 font-semibold">Logout</button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-5 py-10">
    <section class="rounded-[2rem] bg-gradient-to-br from-zinc-950 to-cyan-900 text-white p-8 md:p-10">
      <p class="text-cyan-200 font-semibold">Firebase Form Board</p>
      <h1 class="text-4xl md:text-5xl font-black mt-3">Client Requests</h1>
      <p class="text-white/65 mt-4 max-w-2xl">Yahan website ke lead/proposal form se submit hua data Firestore ke <b>leads</b> collection se aayega.</p>
      <div class="mt-8 inline-flex items-center gap-3 rounded-2xl bg-white/10 border border-white/15 px-5 py-3">
        <i class="fa-solid fa-database text-cyan-300"></i>
        <span>Total leads:</span>
        <strong id="ps-total-leads">0</strong>
      </div>
    </section>

    <section class="mt-8">
      <div id="ps-leads-board" class="grid gap-4"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="pragati-firebase.js"></script>
</body>
</html>
