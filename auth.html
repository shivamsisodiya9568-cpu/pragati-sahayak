<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Create Account • Pragati Sahayak</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-zinc-950 via-slate-900 to-cyan-950 text-white">
  <main class="min-h-screen grid place-items-center px-5 py-12">
    <section class="w-full max-w-5xl grid lg:grid-cols-2 rounded-[2rem] overflow-hidden bg-white/10 backdrop-blur-2xl border border-white/15 shadow-2xl">
      <div class="p-8 md:p-12 bg-gradient-to-br from-cyan-500/20 to-amber-400/10">
        <a href="index.html" class="inline-flex items-center gap-3 text-white/90 hover:text-white">
          <span class="w-11 h-11 rounded-2xl bg-cyan-400 grid place-items-center font-black text-zinc-950">PS</span>
          <span><strong>Pragati Sahayak</strong><br><small class="text-white/55">Digital Growth Partners</small></span>
        </a>
        <h1 class="mt-20 text-5xl font-bold tracking-tight">Client Account</h1>
        <p class="mt-5 text-white/70 text-lg">Login, create account and manage your website/service requests connected with Firebase.</p>
        <a href="dashboard.html" class="mt-10 inline-flex items-center gap-3 rounded-full bg-white text-zinc-950 px-6 py-3 font-bold">
          Open Form Board <i class="fa-solid fa-arrow-right"></i>
        </a>
      </div>

      <div class="p-8 md:p-12">
        <div class="grid gap-8">
          <form onsubmit="psLogin(event)" class="rounded-[1.5rem] bg-white text-zinc-950 p-6 shadow-xl">
            <h2 class="text-2xl font-bold">Login</h2>
            <p class="text-zinc-500 mt-1">Already have an account?</p>
            <div class="mt-6 grid gap-4">
              <input name="email" type="email" required placeholder="Email address" class="h-12 rounded-2xl border px-4 outline-none focus:border-cyan-500">
              <input name="password" type="password" required placeholder="Password" class="h-12 rounded-2xl border px-4 outline-none focus:border-cyan-500">
              <button class="h-12 rounded-2xl bg-zinc-950 text-white font-bold hover:bg-cyan-700">Login</button>
              <button type="button" onclick="psResetPassword()" class="text-sm text-cyan-700 font-semibold">Forgot password?</button>
            </div>
          </form>

          <form onsubmit="psSignup(event)" class="rounded-[1.5rem] bg-white/10 border border-white/15 p-6">
            <h2 class="text-2xl font-bold">Create New Account</h2>
            <p class="text-white/55 mt-1">New client? Signup here.</p>
            <div class="mt-6 grid gap-4">
              <input name="name" type="text" required placeholder="Full name" class="h-12 rounded-2xl bg-white/10 border border-white/20 px-4 outline-none focus:border-cyan-400">
              <input name="phone" type="tel" placeholder="Phone / WhatsApp" class="h-12 rounded-2xl bg-white/10 border border-white/20 px-4 outline-none focus:border-cyan-400">
              <input name="email" type="email" required placeholder="Email address" class="h-12 rounded-2xl bg-white/10 border border-white/20 px-4 outline-none focus:border-cyan-400">
              <input name="password" type="password" required minlength="6" placeholder="Password minimum 6 characters" class="h-12 rounded-2xl bg-white/10 border border-white/20 px-4 outline-none focus:border-cyan-400">
              <input name="confirmPassword" type="password" required minlength="6" placeholder="Confirm password" class="h-12 rounded-2xl bg-white/10 border border-white/20 px-4 outline-none focus:border-cyan-400">
              <button class="h-12 rounded-2xl bg-cyan-400 text-zinc-950 font-bold hover:bg-cyan-300">Create Account</button>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="pragati-firebase.js"></script>
</body>
</html>
